version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: brewery-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: brewery_db
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - brewery_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: brewery-phpmyadmin
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root123
    depends_on:
      - mysql

volumes:
  brewery_mysql_data:
